<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Entrance</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        /* --- 1. Global Reset & Layout --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* --- UPDATED BACKGROUND COLOR --- */
            /* Adjusted to a deeper "off-black" to blend better with dark images */
            background-color: #999999; 
            
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', cursive;
        }

        /* --- 2. Neon Border Frame --- */
        .neon-frame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Allows clicking through the border */
            z-index: 100;
            
            /* The Neon Glow */
            border: 6px solid #ff00de;
            box-shadow: 
                0 0 20px #ff00de, 
                inset 0 0 20px #ff00de;
        }

        /* --- 3. The Arcade Machine Container --- */
        .arcade-container {
            position: relative;
            /* Scale limits to ensure the whole machine fits on screen */
            height: 90vh; 
            max-width: 90vw;
            
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        /* The Arcade Cabinet Image */
        .arcade-img {
            display: block;
            max-height: 100%;
            max-width: 100%;
            height: auto;
            width: auto;
            object-fit: contain;
            
            /* Pure visibility: No shadows, no masks, no animations */
            box-shadow: none;
            filter: none;
        }

        /* --- 4. The Screen Overlay (Text) --- */
        .screen-overlay {
            position: absolute;
            /* Adjust these percentages to place text inside the CRT screen */
            top: 35%; 
            left: 23%;
            width: 53%;
            height: 30%;
            
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .start-text {
            color: #fff;
            font-size: clamp(12px, 2.5vw, 28px); /* Responsive text size */
            text-align: center;
            text-transform: uppercase;
            
            /* Neon Text Glow */
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #ff00de,
                0 0 20px #ff00de;
            
            /* Blinking Animation */
            animation: blinker 0.8s steps(2, start) infinite;
        }

        /* --- 5. Animations --- */
        @keyframes blinker {
            to { visibility: hidden; }
        }

        /* --- 6. Transition Effects --- */
        .flash-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: white; opacity: 0; pointer-events: none; z-index: 999;
            transition: opacity 0.1s ease-out;
        }

        .flash-active { opacity: 1; }

        .stop-blink {
            animation: none !important;
            opacity: 1 !important;
            visibility: visible !important;
            color: #ffff00;
            text-shadow: 0 0 15px #ffff00;
        }
    </style>
</head>
<body>

    <div class="neon-frame"></div>

    <div class="flash-overlay" id="flash"></div>

    <div class="arcade-container" id="trigger-area">
        <img src="Website Enter.jpg" alt="Retro Arcade Cabinet" class="arcade-img">
        
        <div class="screen-overlay">
            <h1 class="start-text" id="start-msg">PRESS TO START</h1>
        </div>
    </div>

    <audio id="startup-sound" src="./insert-coin.mp3"></audio>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const startMsg = document.getElementById('start-msg');
            const flash = document.getElementById('flash');
            const audio = document.getElementById('startup-sound');
            let hasStarted = false;

            function initiateSequence() {
                if (hasStarted) return;
                hasStarted = true;

                // 1. Visual Feedback
                startMsg.classList.add('stop-blink');
                startMsg.innerText = "LOADING..";

                // 2. Audio
                if(audio) {
                    audio.volume = 0.5;
                    audio.play().catch(e => console.log("Audio blocked"));
                }

                // 3. Flash Effect
                setTimeout(() => { flash.classList.add('flash-active'); }, 300);

                // 4. Redirect
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 1000);
            }

            // Trigger on click anywhere or keypress
            document.addEventListener('click', initiateSequence);
            document.addEventListener('keydown', initiateSequence);
            document.addEventListener('touchstart', initiateSequence);
        });
    </script>
</body>
</html>
