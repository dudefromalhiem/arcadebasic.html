<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Entrance</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        /* --- 1. Global Reset & Layout --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Matches the studio background of the image */
            background-color: #999999; 
            
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', cursive;
            
            /* Make the entire page show a pointer so user knows to click */
            cursor: pointer; 
            
            /* Prevent highlighting text which can block click events on mobile */
            user-select: none;
            -webkit-user-select: none; 
        }

        /* --- 2. Neon Border Frame --- */
        .neon-frame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            
            /* CRITICAL: Ensures clicks pass through this layer to the body */
            pointer-events: none; 
            z-index: 100;
            
            border: 6px solid #ff00de;
            box-shadow: 0 0 20px #ff00de, inset 0 0 20px #ff00de;
        }

        /* ON LAPTOP: Remove the neon frame entirely */
        @media (min-width: 1024px) {
            .neon-frame {
                display: none; /* Completely removes it from layout */
            }
        }

        /* --- 3. The Arcade Machine Container --- */
        .arcade-container {
            position: relative;
            height: 90vh; 
            max-width: 90vw;
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* Ensure this sits above background but below overlays */
            z-index: 50; 
            pointer-events: none; /* Let clicks pass through to the window listener */
        }

        /* The Arcade Cabinet Image */
        .arcade-img {
            display: block;
            max-height: 100%;
            max-width: 100%;
            height: auto;
            width: auto;
            object-fit: contain;
            box-shadow: none;
            filter: none;
        }

        /* --- 4. The Screen Overlay (Text) --- */
        .screen-overlay {
            position: absolute;
            top: 35%; 
            left: 23%;
            width: 53%;
            height: 30%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 60; /* Above the image */
        }

        .start-text {
            color: #fff;
            text-align: center;
            text-transform: uppercase;
            font-size: clamp(12px, 3.5vw, 45px); 
            text-shadow: 0 0 5px #fff, 0 0 10px #ff00de, 0 0 20px #ff00de;
            animation: blinker 0.8s steps(2, start) infinite;
        }

        /* Larger text for Laptops */
        @media (min-width: 1024px) {
            .start-text {
                font-size: 38px; 
            }
        }

        @keyframes blinker {
            to { visibility: hidden; }
        }

        /* --- 5. Transition Effects --- */
        .flash-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: white; opacity: 0; pointer-events: none; z-index: 999;
            transition: opacity 0.1s ease-out;
        }

        .flash-active { opacity: 1; }

        .stop-blink {
            animation: none !important;
            opacity: 1 !important;
            visibility: visible !important;
            color: #ffff00;
            text-shadow: 0 0 15px #ffff00;
        }
    </style>
</head>
<body>

    <div class="neon-frame"></div>

    <div class="flash-overlay" id="flash"></div>

    <div class="arcade-container">
        <img src="Website Enter.jpg" alt="Retro Arcade Cabinet" class="arcade-img">
        
        <div class="screen-overlay">
            <h1 class="start-text" id="start-msg">PRESS TO START</h1>
        </div>
    </div>

    <audio id="startup-sound" src="./insert-coin.mp3"></audio>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const startMsg = document.getElementById('start-msg');
            const flash = document.getElementById('flash');
            const audio = document.getElementById('startup-sound');
            let hasStarted = false;

            function initiateSequence(e) {
                // Prevent double firing if user clicks fast or touch+click fires
                if (hasStarted) return;
                hasStarted = true;

                // 1. Visual Feedback
                if(startMsg) {
                    startMsg.classList.add('stop-blink');
                    startMsg.innerText = "LOADING...";
                }

                // 2. Audio
                if(audio) {
                    audio.volume = 0.5;
                    // Browsers block audio unless triggered by user interaction. 
                    // Since this function runs on 'click', it should work.
                    audio.play().catch(err => console.log("Audio autoplay blocked:", err));
                }

                // 3. Flash Effect
                if(flash) {
                    setTimeout(() => { flash.classList.add('flash-active'); }, 300);
                }

                // 4. Redirect
                setTimeout(() => {
                    console.log("Redirecting...");
                    window.location.href = 'home.html';
                }, 1000);
            }

            // Using window listener ensures clicks anywhere on the page work
            window.addEventListener('click', initiateSequence);
            window.addEventListener('touchstart', initiateSequence);
            window.addEventListener('keydown', initiateSequence);
        });
    </script>
</body>
</html>
