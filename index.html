<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Entrance</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        /* --- 1. Global Reset & Layout --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Matches the dark grey studio background of the image */
            background-color: #2b2b2b; 
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', cursive;
        }

        /* --- 2. The Main Container (The Machine) --- */
        .arcade-container {
            position: relative;
            height: 90vh; /* Adjusts based on screen height */
            width: auto;
            /* The Initial Zoom Animation */
            animation: zoomInEffect 4s ease-out forwards;
            transform-origin: center center;
            cursor: pointer;
        }

        /* The Arcade Cabinet Image */
        .arcade-img {
            display: block;
            height: 100%;
            width: auto;
            object-fit: contain;

            /* --- NO SHADOWS --- */
            box-shadow: none; 
            
            /* Blending: Fades the hard edges into the background color */
            -webkit-mask-image: radial-gradient(closest-side, black 60%, transparent 100%);
            mask-image: radial-gradient(closest-side, black 60%, transparent 100%);
        }

        /* --- 3. The Screen Overlay (Text) --- */
        .screen-overlay {
            position: absolute;
            /* Approximate positioning for the CRT screen */
            top: 35%; 
            left: 23%;
            width: 53%;
            height: 30%;
            
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: none; 
        }

        .start-text {
            color: #fff;
            font-size: clamp(12px, 2vw, 24px);
            text-align: center;
            text-transform: uppercase;
            
            /* Kept only the neon glow (emission), removed drop shadows */
            text-shadow: 
                0 0 10px #ff00de,
                0 0 20px #ff00de;
            
            animation: blinker 1s linear infinite;
        }

        /* --- 4. Animations --- */
        @keyframes zoomInEffect {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes blinker {
            50% { opacity: 0; }
        }

        /* --- 5. Transition Effects --- */
        .flash-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: white; opacity: 0; pointer-events: none; z-index: 999;
            transition: opacity 0.1s ease-out;
        }

        .flash-active { opacity: 1; }

        .stop-blink {
            animation: none !important;
            opacity: 1 !important;
            color: #ffff00;
            text-shadow: 0 0 15px #ffff00;
        }
    </style>
</head>
<body>

    <div class="flash-overlay" id="flash"></div>

    <div class="arcade-container">
        <img src="Website Enter.jpg" alt="Retro Arcade Cabinet" class="arcade-img">
        
        <div class="screen-overlay">
            <h1 class="start-text" id="start-msg">PRESS TO START</h1>
        </div>
    </div>

    <audio id="startup-sound" src="./insert-coin.mp3"></audio>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const startMsg = document.getElementById('start-msg');
            const flash = document.getElementById('flash');
            const audio = document.getElementById('startup-sound');
            let hasStarted = false;

            function initiateSequence() {
                if (hasStarted) return;
                hasStarted = true;

                startMsg.classList.add('stop-blink');
                startMsg.innerText = "LOADING...";

                if(audio) {
                    audio.volume = 0.5;
                    audio.play().catch(e => console.log("Audio blocked"));
                }

                setTimeout(() => { flash.classList.add('flash-active'); }, 400);

                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 1200);
            }

            document.addEventListener('click', initiateSequence);
            document.addEventListener('keydown', initiateSequence);
            document.addEventListener('touchstart', initiateSequence);
        });
    </script>
</body>
</html>
