<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Entrance</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        /* --- 1. Global Reset & Layout --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Matches the grey studio background of image_2.jpg */
            background-color: #9e9e9e; 
            
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', cursive;
            
            /* Make the entire page show a pointer so user knows to click */
            cursor: pointer; 
            
            /* Prevent highlighting text which can block click events on mobile */
            user-select: none;
            -webkit-user-select: none; 
        }

        /* --- 2. The Arcade Machine Container --- */
        .arcade-container {
            position: relative;
            /* Adjust height to fit the machine comfortably */
            height: 95vh; 
            width: 95vw;
            display: flex;
            justify-content: center;
            align-items: center;
            
            z-index: 50; 
            pointer-events: none; 
        }

        /* The Arcade Cabinet Image */
        .arcade-img {
            display: block;
            max-height: 100%;
            max-width: 100%;
            height: auto;
            width: auto;
            object-fit: contain;
        }

        /* --- 3. The Screen Overlay (Text) --- */
        /* UPDATED COORDINATES FOR IMAGE_2.JPG */
        .screen-overlay {
            position: absolute;
            /* These percentages place the box exactly over the glass screen */
            top: 36%; 
            left: 39%;
            width: 22%;
            height: 18%;
            
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 60; 
            
            /* Optional: slight curve to match the CRT monitor */
            border-radius: 10px;
            overflow: hidden;
        }

        .start-text {
            color: #e53dda; /* Light green phosphor look */
            text-align: center;
            text-transform: uppercase;
            /* Font size scaled down to fit this specific image's screen size */
            font-size: clamp(6px, 1.2vw, 24px); 
            line-height: 1.5;
            text-shadow: 0 0 5px #ccffcc, 0 0 10px #00ff00;
            animation: blinker 0.8s steps(2, start) infinite;
        }

        @keyframes blinker {
            to { visibility: hidden; }
        }

        /* --- 4. Transition Effects --- */
        .flash-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: white; opacity: 0; pointer-events: none; z-index: 999;
            transition: opacity 0.1s ease-out;
        }

        .flash-active { opacity: 1; }

        .stop-blink {
            animation: none !important;
            opacity: 1 !important;
            visibility: visible !important;
            color: #f0f000;
            text-shadow: 0 0 15px #ffff00;
        }
    </style>
</head>
<body>

    <div class="flash-overlay" id="flash"></div>

    <div class="arcade-container">
        <img src="image_2.png" alt="Retro Arcade Cabinet" class="arcade-img">
        
        <div class="screen-overlay">
            <h1 class="start-text" id="start-msg">INSERT<br>COIN</h1>
        </div>
    </div>

    <audio id="startup-sound" src="./insert-coin.mp3"></audio>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const startMsg = document.getElementById('start-msg');
            const flash = document.getElementById('flash');
            const audio = document.getElementById('startup-sound');
            let hasStarted = false;

            function initiateSequence(e) {
                if (hasStarted) return;
                hasStarted = true;

                // 1. Visual Feedback
                if(startMsg) {
                    startMsg.classList.add('stop-blink');
                    startMsg.innerHTML = "LOADING..."; // Change text to Loading
                }

                // 2. Audio
                if(audio) {
                    audio.volume = 0.5;
                    audio.play().catch(err => console.log("Audio autoplay blocked:", err));
                }

                // 3. Flash Effect
                if(flash) {
                    setTimeout(() => { flash.classList.add('flash-active'); }, 500);
                }

                // 4. Redirect
                setTimeout(() => {
                    console.log("Redirecting...");
                    window.location.href = 'home.html';
                }, 1200);
            }

            window.addEventListener('click', initiateSequence);
            window.addEventListener('touchstart', initiateSequence);
            window.addEventListener('keydown', initiateSequence);
        });
    </script>
</body>
</html>
